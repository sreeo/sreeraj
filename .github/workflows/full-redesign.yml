name: Full Site Rebuild

on:
  workflow_dispatch:
    inputs:
      trend:
        description: 'Design style (e.g., "apple.com minimal", "newspaper 1920s", "vercel dashboard")'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install site dependencies
        run: npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build prompt
        run: |
          TREND="${{ inputs.trend }}"
          if [ -z "$TREND" ]; then
            TREND="Search the web for the most cutting-edge web design trends right now and pick one that would make a stunning personal tech blog"
          fi
          sed "s|{{TREND}}|${TREND}|g" automation/prompts/full-rebuild.md > /tmp/rebuild-prompt.md
          echo "Trend: ${TREND}"

      - name: Run Claude Code rebuild
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat /tmp/rebuild-prompt.md)" \
            --print \
            --dangerously-skip-permissions \
            --max-turns 30

      - name: Build final site
        run: npm run build

      - name: Install automation deps
        run: cd automation && npm ci

      - name: Validate with Playwright
        run: |
          cd automation
          npx tsx -e "
            import { validateDesign } from './validate-design.js';
            import fs from 'fs';
            const css = fs.readFileSync('../src/styles/global.css', 'utf-8');
            const result = await validateDesign(css);
            for (const step of result.steps) {
              const icon = step.passed ? 'PASS' : 'FAIL';
              console.log('[' + icon + '] ' + step.name + ': ' + step.message);
            }
            process.exit(0);
          "

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rebuild-screenshots
          path: automation/test-output/
          retention-days: 30

      - name: Create PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if there are changes
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes generated"
            exit 1
          fi

          TREND="${{ inputs.trend }}"
          [ -z "$TREND" ] && TREND="auto-discovered"

          BRANCH="rebuild/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Full site rebuild: ${TREND}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "Full rebuild: ${TREND}" \
            --body "$(cat <<PREOF
          ## Full Site Rebuild

          **Design style:** ${TREND}
          **Generated:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          Review the Cloudflare preview URL in the checks below.
          Screenshots available in [workflow artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).

          If it looks good, merge this PR to deploy to production.
          PREOF
          )" \
            --head "$BRANCH" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
