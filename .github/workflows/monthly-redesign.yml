name: Monthly Redesign

on:
  schedule:
    - cron: '0 3 1 * *'  # 1st of every month at 03:00 UTC
  workflow_dispatch:        # Manual trigger for testing
    inputs:
      dry_run:
        description: 'Dry run (generate + validate only, no commit)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      trend:
        description: 'Force specific trend (e.g., cyberpunk, neo-brutalism)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  redesign:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install site dependencies
        run: npm ci

      - name: Install automation dependencies
        run: cd automation && npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run redesign
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd automation
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.trend }}" ]; then
            ARGS="$ARGS --trend=${{ inputs.trend }}"
          fi
          npx tsx redesign-orchestrator.ts $ARGS

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redesign-output
          path: automation/test-output/
          retention-days: 30

      - name: Commit and push
        if: inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if there are changes to commit
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          TREND_NAME="unknown"
          if [ -f automation/history/current-trend.txt ]; then
            TREND_NAME=$(cat automation/history/current-trend.txt)
          fi

          git add -A
          git commit -m "Monthly redesign: ${TREND_NAME}

          Automated design refresh with ${TREND_NAME} aesthetic.
          Generated by the monthly redesign pipeline."

          git push
